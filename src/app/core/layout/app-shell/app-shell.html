<div class="shell">
  <app-sidebar />

  <div class="shell__content">
    <app-topbar />

    @if (loadingService.isLoading()) {
      <div class="shell__loading">
        <div class="shell__loading-box">
          <p-progressspinner
            ariaLabel="Application loading"
            strokeWidth="4"
          />
        </div>
      </div>
    }

    <main class="shell__main">
      <router-outlet />
    </main>
  </div>
</div>
