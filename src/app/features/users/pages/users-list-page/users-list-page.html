<section class="users-page">
  <app-page-header
    title="Users"
    description="Manage users, roles, and account records."
  >
    <button
      pButton
      type="button"
      label="New User"
      icon="pi pi-plus"
      (click)="goToCreate()"
    ></button>
  </app-page-header>

  <app-section-card>
    <div class="users-field">
      <label for="userSearch">Search</label>
      <input
        id="userSearch"
        pInputText
        [ngModel]="searchValue()"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Search by name, email, or role"
      />
    </div>
  </app-section-card>

  @if (usersFacade.isLoading()) {
    <div class="users-grid">
      @for (item of [1, 2, 3, 4, 5, 6]; track item) {
        <app-section-card>
          <div class="user-card__skeleton">
            <p-skeleton shape="circle" size="4rem" />
            <div>
              <p-skeleton width="10rem" height="1rem" />
              <div style="height: .5rem;"></div>
              <p-skeleton width="8rem" height=".9rem" />
            </div>
          </div>
        </app-section-card>
      }
    </div>
  } @else if (usersFacade.hasError()) {
    <app-section-card>
      <app-state-card
        tone="error"
        icon="pi pi-exclamation-triangle"
        title="Failed to load users"
        [description]="usersFacade.listState().errorMessage || 'Unexpected error.'"
      >
        <button
          pButton
          type="button"
          label="Try Again"
          icon="pi pi-refresh"
          (click)="usersFacade.loadUsers()"
        ></button>
      </app-state-card>
    </app-section-card>
  } @else if (usersFacade.isEmpty()) {
    <app-section-card>
      <app-state-card
        tone="empty"
        icon="pi pi-inbox"
        title="No users found"
        description="Create a user or change the search term."
      />
    </app-section-card>
  } @else {
    <div class="users-grid">
      @for (user of usersFacade.filteredUsers(); track trackByUserId($index, user)) {
        <app-section-card>
          <div class="user-card__top">
            <p-avatar
              [image]="usersFacade.avatarPreview(user.avatar)"
              shape="circle"
              size="xlarge"
            ></p-avatar>

            <div class="user-card__identity">
              <strong>{{ user.name }}</strong>
              <span>{{ user.email }}</span>
            </div>
          </div>

          <div class="user-card__meta">
            <p-tag
              [value]="user.role"
              [severity]="usersFacade.roleSeverity(user.role)"
            ></p-tag>
          </div>

          <div class="user-card__actions">
            <button
              pButton
              type="button"
              label="Edit"
              icon="pi pi-pencil"
              [outlined]="true"
              size="small"
              (click)="goToEdit(user)"
            ></button>

            <button
              pButton
              type="button"
              label="Delete"
              icon="pi pi-trash"
              severity="danger"
              [outlined]="true"
              size="small"
              [loading]="usersFacade.isSubmitting()"
              (click)="requestDelete($event, user)"
            ></button>
          </div>
        </app-section-card>
      }
    </div>
  }
</section>
