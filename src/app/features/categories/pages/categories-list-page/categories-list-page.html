<section class="categories-page">
  <app-page-header
    title="Categories"
    description="Manage category catalog and classification structure."
  >
    <button
      pButton
      type="button"
      label="New Category"
      icon="pi pi-plus"
      (click)="goToCreate()"
    ></button>
  </app-page-header>

  <app-section-card>
    <div class="categories-field">
      <label for="categorySearch">Search</label>
      <input
        id="categorySearch"
        pInputText
        [ngModel]="searchValue()"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Search by category name"
      />
    </div>
  </app-section-card>

  @if (categoriesFacade.isLoading()) {
    <div class="categories-grid">
      @for (item of [1, 2, 3, 4, 5, 6]; track item) {
        <app-section-card>
          <div class="category-card category-card--skeleton">
            <p-skeleton width="100%" height="12rem" />
            <div style="height: .75rem;"></div>
            <p-skeleton width="60%" height="1rem" />
            <div style="height: .75rem;"></div>
            <p-skeleton width="100%" height="2.5rem" />
          </div>
        </app-section-card>
      }
    </div>
  } @else if (categoriesFacade.hasError()) {
    <app-section-card>
      <app-state-card
        tone="error"
        icon="pi pi-exclamation-triangle"
        title="Failed to load categories"
        [description]="categoriesFacade.listState().errorMessage || 'Unexpected error.'"
      >
        <button
          pButton
          type="button"
          label="Try Again"
          icon="pi pi-refresh"
          (click)="categoriesFacade.loadCategories()"
        ></button>
      </app-state-card>
    </app-section-card>
  } @else if (categoriesFacade.isEmpty()) {
    <app-section-card>
      <app-state-card
        tone="empty"
        icon="pi pi-inbox"
        title="No categories found"
        description="Create a category or change the search term."
      />
    </app-section-card>
  } @else {
    <div class="categories-content">
      <div class="categories-grid">
        @for (category of paginatedCategories(); track trackByCategoryId($index, category)) {
          <app-section-card>
            <div class="category-card">
              <div class="category-card__media">
                <img
                  [src]="categoriesFacade.imagePreview(category.image)"
                  [alt]="category.name"
                />
              </div>

              <div class="category-card__content">
                <strong>{{ category.name }}</strong>

                <div class="category-card__actions">
                  <button
                    pButton
                    type="button"
                    label="Edit"
                    icon="pi pi-pencil"
                    [outlined]="true"
                    size="small"
                    (click)="goToEdit(category)"
                  ></button>

                  <button
                    pButton
                    type="button"
                    label="Delete"
                    icon="pi pi-trash"
                    severity="danger"
                    [outlined]="true"
                    size="small"
                    [loading]="categoriesFacade.isSubmitting()"
                    (click)="requestDelete($event, category)"
                  ></button>
                </div>
              </div>
            </div>
          </app-section-card>
        }
      </div>

      <div class="categories-paginator">
        <p-paginator
          [first]="first()"
          [rows]="rows()"
          [totalRecords]="totalRecords()"
          [rowsPerPageOptions]="[6, 9, 12, 18]"
          (onPageChange)="onPageChange($event)"
        ></p-paginator>
      </div>
    </div>
  }
</section>
