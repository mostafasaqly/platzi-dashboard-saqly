<section class="settings-page">
  <app-page-header
    title="Settings"
    description="Manage dashboard appearance and local application preferences."
  />

  <div class="settings-grid">
    <app-section-card
      title="Appearance"
      description="Theme and display density preferences."
    >
      <div class="settings-form">
        <div class="settings-field">
          <label for="themeMode">Theme Mode</label>
          <select
            id="themeMode"
            class="settings-native-select"
            [ngModel]="themeMode()"
            (ngModelChange)="onThemeModeChange($event)"
          >
            <option value="light">light</option>
            <option value="dark">dark</option>
          </select>
        </div>

        <div class="settings-field">
          <label for="density">Density</label>
          <select
            id="density"
            class="settings-native-select"
            [ngModel]="density()"
            (ngModelChange)="onDensityChange($event)"
          >
            <option value="comfortable">comfortable</option>
            <option value="compact">compact</option>
          </select>
        </div>
      </div>
    </app-section-card>

    <app-section-card
      title="Products Module"
      description="Set the default page size for the products list."
    >
      <div class="settings-form">
        <div class="settings-field">
          <label for="productsPageSize">Default Page Size</label>
          <select
            id="productsPageSize"
            class="settings-native-select"
            [ngModel]="productsPageSize()"
            (ngModelChange)="onPageSizeChange($event)"
          >
            @for (size of pageSizes; track size) {
              <option [ngValue]="size">{{ size }}</option>
            }
          </select>
        </div>
      </div>
    </app-section-card>
  </div>
</section>
