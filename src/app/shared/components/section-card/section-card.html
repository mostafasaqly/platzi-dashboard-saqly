<section class="section-card">
  @if (title() || description()) {
    <header class="section-card__head">
      @if (title()) {
        <h2>{{ title() }}</h2>
      }

      @if (description()) {
        <p>{{ description() }}</p>
      }
    </header>
  }

  <div class="section-card__body">
    <ng-content />
  </div>
</section>
